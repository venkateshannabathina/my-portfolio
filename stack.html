<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stack — Venkatesh Annabathina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #F5F3EE;
            --surface: #ECEAE3;
            --text: #0a0a0a;
            --muted: #6b6b6b;
            --border: #dddad4;
            --accent: #C97B63;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* NAV */
        nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            height: 56px;
        }

        .nav-logo {
            font-family: 'Inter', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo-rest {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            transition: max-width 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            max-width: 120px;
            opacity: 1;
        }

        nav.scrolled .logo-rest {
            max-width: 0;
            opacity: 0;
        }

        .nav-links {
            display: flex;
            gap: 36px;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-links a.active {
            color: var(--text);
            text-decoration: underline;
            text-underline-offset: 6px;
            text-decoration-thickness: 2px;
        }

        .nav-links a:hover {
            color: var(--text);
        }

        .nav-cta {
            background: var(--text) !important;
            color: var(--bg) !important;
            padding: 9px 22px !important;
            border-radius: 100px !important;
            font-weight: 700 !important;
            text-decoration: none;
            font-size: 0.88rem;
        }

        .content {
            height: 100vh;
        }
    </style>
</head>

<body>
    <nav id="mainNav">
        <a href="about.html" class="nav-logo">Dev<span class="logo-rest">eloper</span></a>
        <ul class="nav-links">
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="stack.html" class="active">Stack</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="journey.html" class="nav-cta">Journey</a></li>
        </ul>
    </nav>

    <div class="content"></div>

    <script>
        const nav = document.getElementById('mainNav');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 40) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });
    </script>
</body>

</html>
