<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Introducing Venkatesh Annabathina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Mono:wght@300;400&family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #F5F3EE;
            --surface: #ECEAE3;
            --text: #0a0a0a;
            --muted: #6b6b6b;
            --border: #dddad4;
            --accent: #C97B63;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* NAV */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            height: 56px;
        }

        .nav-logo {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo-rest {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            transition: max-width 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            max-width: 120px;
            opacity: 1;
        }

        nav.scrolled .logo-rest {
            max-width: 0;
            opacity: 0;
        }

        .nav-links {
            display: flex;
            gap: 36px;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-links a.active {
            color: var(--text);
            text-decoration: underline;
            text-underline-offset: 6px;
            text-decoration-thickness: 2px;
        }

        .nav-links a:hover {
            color: var(--text);
            text-decoration: underline;
            text-underline-offset: 6px;
            text-decoration-thickness: 2px;
        }

        .nav-cta {
            background: var(--text) !important;
            color: var(--bg) !important;
            padding: 9px 22px !important;
            border-radius: 100px !important;
            font-weight: 700 !important;
        }

        .nav-cta:hover {
            text-decoration: none !important;
        }

        /* ARTICLE */
        .article {
            max-width: 680px;
            margin: 0 auto;
            padding: 80px 24px 120px;
        }

        .article-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            color: var(--text);
            text-align: center;
            margin-bottom: 20px;
        }

        .article-title {
            font-family: 'DM Sans', sans-serif;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.03em;
            text-align: center;
            color: var(--text);
            margin-bottom: 20px;
        }

        .article-title:hover {
            text-decoration: underline;
            text-decoration-thickness: 3px;
            text-underline-offset: 8px;
        }

        .article-date {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 400;
            color: var(--muted);
            text-align: center;
            margin-bottom: 56px;
        }

        /* PHOTO */
        .article-image {
            width: 100%;
            background: var(--surface);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 56px;
            aspect-ratio: 16/9;
        }

        .article-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }

        /* BODY TEXT */
        .article-body {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.08rem;
            font-weight: 400;
            line-height: 1.85;
            color: #2a2a2a;
        }

        .article-body p {
            margin-bottom: 24px;
        }

        .article-body p:last-child {
            margin-bottom: 0;
        }

        .article-body a {
            color: var(--text);
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: var(--border);
            transition: text-decoration-color 0.2s;
        }

        .article-body a:hover {
            text-decoration-color: var(--accent);
        }

        .article-body strong {
            font-weight: 700;
            color: var(--text);
        }
    


    </style>
</head>

<body>



    <nav>
        <a href="#" class="nav-logo">Dev<span class="logo-rest">eloper</span></a>
                <ul class="nav-links">
            <li><a href="about.html" target="_self">About</a></li>
            <li><a href="projects.html" target="_self">Projects</a></li>
            <li><a href="stack.html" target="_self">Stack</a></li>
            <li><a href="contact.html" target="_self" class="active">Contact</a></li>
            <li><a href="journey.html" class="nav-cta" target="_self">Journey</a></li>
        </ul>
    </nav>

<div style="height: 100vh;"></div>
    <script>
        const nav = document.querySelector('nav');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 40) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });
    


    </script>

    <style>
        * {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
        }
    </style>
    <script>
        document.addEventListener("dragstart", function(e) {
            e.preventDefault();
        });
    </script>
</body>

</html>
